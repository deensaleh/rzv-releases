name: Mirror Release from SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to mirror (e.g. v3.9.3)'
        required: true
        default: 'latest'
  repository_dispatch:
    types: [sdk-release]

jobs:
  mirror:
    name: Mirror binaries to public releases
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version || 'latest' }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Mirroring version: $VERSION"

      - name: Download all binaries from private SDK repo
        env:
          GH_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          mkdir -p binaries
          FILES=(
            "rsbis-gateway-linux-arm64"
            "rsbis-gateway-linux-x86_64"
            "rsbis-gateway-macos-arm64"
            "rsbis-gateway-macos-x86_64"
            "rsbis-gateway-windows-x64.exe"
            "SHA256SUMS.txt"
          )
          for f in "${FILES[@]}"; do
            echo "Downloading $f..."
            gh release download ${{ env.VERSION }} \
              --repo deensaleh/rsbis-sdk \
              --pattern "$f" \
              --dir binaries/ \
              --skip-errors 2>/dev/null && echo "  OK $f" || echo "  SKIP $f"
          done
          # APK uses version in filename
          gh release download ${{ env.VERSION }} \
            --repo deensaleh/rsbis-sdk \
            --pattern "rootzerovault-*.apk" \
            --dir binaries/ \
            --skip-errors 2>/dev/null || true
          ls -lh binaries/

      - name: Create public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ env.VERSION }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          gh release create "$VERSION" binaries/* \
            --title "Root Zero Vault $VERSION" \
            --notes "Constitutional AI Governance Infrastructure. See rootzerovault.com for install instructions."
