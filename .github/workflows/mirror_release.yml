name: Mirror Release from SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to mirror (e.g. v3.9.3)'
        required: true
        default: 'v3.9.3'
  repository_dispatch:
    types: [sdk-release]

jobs:
  mirror:
    name: Mirror binaries to public releases
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.client_payload.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Mirroring version: $VERSION"

      - name: Download ALL binaries from private SDK repo
        env:
          GH_TOKEN: ${{ secrets.SDK_ACCESS_TOKEN }}
        run: |
          mkdir -p binaries
          VERSION="${{ env.VERSION }}"
          echo "Downloading all assets from deensaleh/rsbis-sdk release $VERSION"

          # List available assets
          gh release view "$VERSION" --repo deensaleh/rsbis-sdk || echo "Could not view release"

          # Download everything
          gh release download "$VERSION" \
            --repo deensaleh/rsbis-sdk \
            --dir binaries/ \
            --pattern "*" || true

          echo "--- Downloaded files ---"
          ls -lh binaries/ || echo "binaries/ is empty"

          COUNT=$(ls binaries/ 2>/dev/null | wc -l)
          echo "Total: $COUNT files"
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No files downloaded. Check SDK_ACCESS_TOKEN secret."
            exit 1
          fi

      - name: Create public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ env.VERSION }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git tag -d "$VERSION" 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true
          gh release create "$VERSION" binaries/* \
            --title "Root Zero Vault $VERSION" \
            --notes "Constitutional AI Governance Infrastructure. rootzerovault.com"
          echo "Public release created: $VERSION"
